<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelly-Chain L2 Dashboard 🚀</title>
    <style>
        <script src="https://unpkg.com/@initia/initia.js@latest/dist/bundle.js"></script><script src="https://unpkg.com/@initia/interwovenkit@latest/dist/bundle.js"></script>body {
            background: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .badge {
            background: #22c55e;
            color: #052e16;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        h1 {
            font-size: 1.2rem;
            color: #38bdf8;
            margin: 0;
            letter-spacing: 1px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .stat-val {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fbbf24;
            margin-top: 5px;
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 94%;
            margin-top: 10px;
            outline: none;
        }

        .btn {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #log-msg {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 15px;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>JELLY-L2 MONITOR</h1>
            <div class="badge">Live Node</div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">Latest Block</div>
                <div id="block-height" class="stat-val">---</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Jelly Balance</div>
                <div id="jelly-val" class="val stat-val">---</div>
            </div>
        </div>

        <div style="text-align: left;">
            <div class="stat-label">Receiver Address</div>
            <input type="text" id="dest-addr" value="init19gj5htt3qm884a4d6w752hm4m2wpu7wk32w6v3">

            <div style="margin-top: 15px;" class="stat-label">Amount (ujelly)</div>
            <input type="number" id="send-amt" placeholder="e.g. 1000">
        </div>

        <button class="btn" onclick="genCommand()">🚀 GENERATE & COPY COMMAND</button>
        <div id="log-msg">Waiting for node sync...</div>
    </div>

    <script>
        const OWNER = 'init15x2jkf4knyxxwfu39jcg8flmvyqf8wf68p3fmf';
        const API_URL = 'http://localhost:1317';

        async function syncNode() {
            try {
                const balRes = await fetch(`${API_URL}/cosmos/bank/v1beta1/balances/${OWNER}`);
                const balData = await balRes.json();
                const jelly = balData.balances.find(x => x.denom === 'ujelly')?.amount || 0;
                document.getElementById('jelly-val').innerText = BigInt(jelly).toLocaleString();

                const blockRes = await fetch(`${API_URL}/cosmos/base/tendermint/v1beta1/blocks/latest`);
                const blockData = await blockRes.json();
                document.getElementById('block-height').innerText = "#" + blockData.block.header.height;

                document.getElementById('log-msg').innerText = "Connected to Jelly-Chain L2";
            } catch (e) {
                document.getElementById('log-msg').innerText = "Node Offline 🗿 Check Port 1317!";
            }
        }

        function genCommand() {
            const dest = document.getElementById('dest-addr').value;
            const amt = document.getElementById('send-amt').value;
            if (!dest || !amt) return alert("Sultan lupa isi alamat atau jumlah!");

            const cmd = `minitiad tx bank send gas-station ${dest} ${amt}ujelly --keyring-backend test --chain-id jelly-chain -y`;
            navigator.clipboard.writeText(cmd);
            document.getElementById('log-msg').innerText = "COMMAND COPIED! Paste to Terminal.";
            alert("Sultan Command Copied!");
        }

        setInterval(syncNode, 2000);
        syncNode();
    </script>
</body>

</html>
